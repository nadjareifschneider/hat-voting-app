<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Personenverwaltung</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
    }
    h1 {
      margin-bottom: 20px;
    }
    #person-list {
      margin-top: 20px;
    }
    .person {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
    #new-person {
      margin-top: 30px;
      display: flex;
      gap: 10px;
    }
    input[type="text"] {
      flex: 1;
      padding: 8px;
      font-size: 16px;
    }
    button {
      padding: 8px 14px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Personen</h1>

  <div id="person-list"></div>

  <div id="new-person">
    <input id="person-name" type="text" placeholder="Neue Person eingeben…" />
    <button id="add-btn">Hinzufügen</button>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'

    const supabase = createClient(
      'https://encergwbfwrbirypfczq.supabase.co',
      'sb_publishable_22vd4SJ51OkyVTSSGKIl9A_8ECO4VpG'
    )

    // -----------------------------

    // 1) Anonymous Auth sicherstellen
    // -----------------------------
    const { data: session } = await supabase.auth.getSession()
    if (!session.session) {
      await supabase.auth.signInAnonymously()
    }

    // -----------------------------
    // 2) Personen laden
    // -----------------------------
    async function loadPersons() {
      const list = document.getElementById('person-list')
      list.innerHTML = 'Lade Personen…'

      const { data, error } = await supabase
        .from('person')
        .select('*')
        .order('name', { ascending: true })

      if (error) {
        list.innerHTML = 'Fehler beim Laden.'
        console.error(error)
        return
      }

      list.innerHTML = ''
      data.forEach(person => {
        const div = document.createElement('div')
        div.className = 'person'
        div.textContent = person.name
        list.appendChild(div)
      })
    }

    loadPersons()

    // -----------------------------
    // 3) Neue Person hinzufügen
    // -----------------------------
    document.getElementById('add-btn').addEventListener('click', async () => {
      const nameInput = document.getElementById('person-name')
      const name = nameInput.value.trim()

      if (!name) return

      const { error } = await supabase
        .from('person')
        .insert({ name })

      if (error) {
        alert('Fehler: ' + error.message)
        return
      }

      nameInput.value = ''
      loadPersons()
    })
  </script>

</body>
</html>

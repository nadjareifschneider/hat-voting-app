<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Annas & Nadjas Hutvoting</title>

  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      background-image: 
        url("https://encergwbfwrbirypfczq.supabase.co/storage/v1/object/sign/person-images/person-images/hat_pink.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV8xMDU4MTUxZC1lMDhkLTQ3NzYtOTQ1My1kY2ExMDgwYTQxN2EiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJwZXJzb24taW1hZ2VzL3BlcnNvbi1pbWFnZXMvaGF0X3BpbmsucG5nIiwic2NvcGUiOiJkb3dubG9hZCIsImlhdCI6MTc4MTY0NTI0NSwiZXhwIjoxNzg0MjM3MjQ1fQ.0Bg895MnxCM4kPjgdIcSxbnk_rjw0KMzofmLRHlVcWY");
      background-repeat: repeat;
    }

    #header-image-wrapper {
      display: flex;
      justify-content: flex-start;
      margin-bottom: 10px;
    }
    
    #header-image {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 6px;
    }
    
    /* Person Card */
    .person {
      background: #fafafa;
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 20px;
      margin-bottom: 20px;
    }
    
    /* Header: Name links, Votes rechts */
    .person-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .person-name {
      font-size: 1.3rem;
      font-weight: bold;
    }
    
    .vote-badge {
      background: #FFDF33;
      padding: 6px 12px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 1rem;
      box-shadow: 0 0 6px rgba(255, 215, 0, 0.7);
    }
    
    /* Body: Bild links, Button rechts */
    .person-body {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .person img {
      width: 200px;
      border-radius: 8px;
    }
    
    /* Vote Button */
    .vote-btn {
      font-size: 20px;
      padding: 16px 24px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease;
      color: white;
    }
    
    .vote-btn:active {
      transform: scale(0.9);
    }
    
    .vote {
      background: gold;
      border: 3px solid gold;
      box-shadow: 0 0 10px gold, 0 0 30px #FFEA00;
    }
    
    /* Upload */
    .upload-btn {
      margin-top: 8px;
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    /* New Person Form */
    #new-person {
      margin-top: 30px;
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 8px;
      font-size: 16px;
    }

    .yellow-card {
      border: 2px solid gold;
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.7);
      background: #fffbe6;
    }
    
    /* Mobile */
    @media (max-width: 600px) {
      body {
        margin: 20px;
      }
      
      .person-body {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>

  <h2>Annas & Nadjas Hutvoting</h2>
  <div id="header-image-wrapper">
    <img id="header-image" src="" alt="Header" />
  </div>
    
  <div>Du hast 5 Stimmen, verteile sie weise.</div>

  <div id="new-person">
    <input id="person-name" type="text" placeholder="Oberhauptbedeckungsenthusiast:in" />
    <button id="add-btn" class="upload-btn">Hinzufügen</button>
  </div>

  <div id="person-list"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'

    const supabase = createClient(
      'https://encergwbfwrbirypfczq.supabase.co',
      'sb_publishable_22vd4SJ51OkyVTSSGKIl9A_8ECO4VpG'
    )

    // -----------------------------
    // Auth sicherstellen
    // -----------------------------
    const { data: session } = await supabase.auth.getSession()
    if (!session.session) {
      await supabase.auth.signInAnonymously()
    }

    // -----------------------------
    // Personen laden
    // -----------------------------
    async function loadPersons() {
      const list = document.getElementById('person-list')
      list.innerHTML = 'Lade Personen…'

      const user = (await supabase.auth.getUser()).data.user

      const { data: persons } = await supabase
        .from('person')
        .select(`
          id,
          name,
          image_url,
          vote:vote(person_id, voter_id)
        `)

      const maxVotes = Math.max(...persons.map(p => p.vote.length))

      const params = new URLSearchParams(window.location.search)
      const sortMode = params.get('sort') || 'name'

      if (sortMode === 'votes') {
        persons.sort((a, b) => b.vote.length - a.vote.length)
      } else {
        persons.sort((a, b) => a.name.localeCompare(b.name))
      }

      const { data: myVotes } = await supabase
        .from('vote')
        .select('*')
        .eq('voter_id', user.id)

      list.innerHTML = ''

      persons.forEach(person => {

        console.log(person.image_url)
        
        const hasVoted = myVotes.some(v => v.person_id === person.id)
        const voteCount = person.vote.length

        const div = document.createElement('div')
        div.className = 'person'
        
        if(hasVoted) {
          div.classList.add('yellow-card')
        }
        
        div.innerHTML = `
          <div class="person-header">
            <div class="person-name">&#x2728; ${person.name} &#x2728;</div>
            <button 
              data-id="${person.id}" 
              class="vote-btn ${hasVoted ? 'vote' : ''} vote-badge">
              &#127775; 
              <span class="vote-count">${voteCount}</span>
            </button>
          </div>
        
          <div class="person-body">
            <img 
              src="${person.image_url ? person.image_url + '?t=' + Date.now() : ''}" 
              data-img-id="${person.id}"
            >
          </div>
        
          <input type="file" data-id="${person.id}" class="upload-input" accept="image/*">
          <button data-id="${person.id}" class="upload-btn">Foto hochladen</button>
        `
        
        list.appendChild(div)
      })

      // Vote Buttons
      document.querySelectorAll('.vote-btn').forEach(btn => {
        btn.addEventListener('click', () => toggleVote(btn.dataset.id))
      })

      // Upload Buttons
      document.querySelectorAll('.upload-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id
          const fileInput = document.querySelector(`.upload-input[data-id="${id}"]`)
          const file = fileInput.files[0]

          if (!file) {
            alert('Bitte ein Bild auswählen.')
            return
          }

          await uploadImage(id, file)
        })
      })
    }

    // -----------------------------
    // Vote toggeln
    // -----------------------------
    async function toggleVote(personId) {
      const user = (await supabase.auth.getUser()).data.user
    
      // Button & Count finden
      const btn = document.querySelector(`.vote-btn[data-id="${personId}"]`)
      const countSpan = btn.querySelector('.vote-count')
      const personDiv = btn.closest('.person')   // <--- HIER
      let count = parseInt(countSpan.textContent.trim())
    
      // Prüfen ob Vote existiert
      const { data: existingVote } = await supabase
        .from('vote')
        .select('*')
        .eq('person_id', personId)
        .eq('voter_id', user.id)
        .maybeSingle()
    
      if (existingVote) {
        // Vote löschen
        await supabase.from('vote').delete().eq('id', existingVote.id)
    
        // DOM aktualisieren
        count--
        countSpan.textContent = count
        btn.classList.remove('vote')
        personDiv.classList.remove('yellow-card')   // <--- HIER
        return
      }
    
      // Prüfen ob User schon 5 Votes hat
      const { data: myVotes } = await supabase
        .from('vote')
        .select('*')
        .eq('voter_id', user.id)
    
      if (myVotes.length >= 5) {
        alert('Du hast bereits 5 Votes vergeben.')
        return
      }
    
      // Vote hinzufügen
      await supabase.from('vote').insert({
        person_id: personId,
        voter_id: user.id
      })
    
      // DOM aktualisieren
      count++
      countSpan.textContent = count
      btn.classList.add('vote')
      personDiv.classList.add('yellow-card')       // <--- HIER
    }

    // -----------------------------
    // Neue Person hinzufügen
    // -----------------------------
    document.getElementById('add-btn').addEventListener('click', async () => {
      const nameInput = document.getElementById('person-name')
      const name = nameInput.value.trim()

      if (!name) return

      const { data: existing } = await supabase
        .from('person')
        .select('id')
        .eq('name', name)
        .maybeSingle()

      if (existing) {
        alert('Der Name existiert schon.')
        return
      }

      await supabase.from('person').insert({ name })

      nameInput.value = ''
      loadPersons()
    })

    // -----------------------------
    // Bild hochladen
    // -----------------------------
    async function uploadImage(personId, file) {
      console.log("🔄 Starte Upload für Person:", personId)
    
      // 1) Bild verkleinern
      try {
        file = await resizeImage(file, 1024, 0.8)
        console.log("📉 Bild verkleinert:", file.size, "Bytes")
      } catch (err) {
        console.error("❌ Fehler beim Verkleinern:", err)
        alert("Bild konnte nicht verkleinert werden.")
        return
      }
    
      const fileName = `${personId}.jpg`
      const filePath = `person-images/${fileName}`
    
      // 2) Upload zu Supabase
      const { data: uploadData, error: uploadError } = await supabase.storage
        .from('person-images')
        .upload(filePath, file, { upsert: true })
    
      if (uploadError) {
        console.error("❌ Upload-Fehler:", uploadError)
        alert("Upload fehlgeschlagen (Storage).")
        return
      }
    
      console.log("✅ Upload erfolgreich:", uploadData)
    
      // 3) Public URL holen
      const { data: publicUrlData, error: urlError } = supabase.storage
        .from('person-images')
        .getPublicUrl(filePath)
    
      if (urlError || !publicUrlData) {
        console.error("❌ Fehler beim Holen der Public URL:", urlError)
        alert("Bild-URL konnte nicht erzeugt werden.")
        return
      }
    
      const publicUrl = publicUrlData.publicUrl
      console.log("🌐 Public URL:", publicUrl)
    
      // 4) URL in DB speichern
      const { data: updateData, error: updateError } = await supabase
        .from('person')
        .update({ image_url: publicUrl })
        .eq('id', personId)
        .select()
    
      if (updateError) {
        console.error("❌ DB-Update-Fehler:", updateError)
        alert("Bild-URL konnte nicht in der Datenbank gespeichert werden.")
        return
      }
    
      console.log("📝 DB erfolgreich aktualisiert:", updateData)
    
      // 5) Bild sofort im UI aktualisieren
      try {
        const img = document.querySelector(`img[data-img-id="${personId}"]`)
        if (img) {
          img.src = publicUrl + `?t=${Date.now()}`
          console.log("🖼️ Bild im UI aktualisiert.")
        } else {
          console.warn("⚠️ Kein IMG-Element gefunden für Person:", personId)
        }
      } catch (err) {
        console.error("❌ Fehler beim Aktualisieren des Bildes im UI:", err)
      }
    }


    async function loadHeaderImage() {
      const { data } = supabase.storage
        .from('person-images')
        .getPublicUrl('person-images/header.jpg')
    
      document.getElementById('header-image').src = data.publicUrl + '?t=' + Date.now()
    }

    async function resizeImage(file, maxWidth = 1024, quality = 0.8) {
      return new Promise(resolve => {
        const img = new Image()
        img.onload = () => {
          const canvas = document.createElement('canvas')
          const scale = maxWidth / img.width
          const newWidth = img.width > maxWidth ? maxWidth : img.width
          const newHeight = img.width > maxWidth ? img.height * scale : img.height
    
          canvas.width = newWidth
          canvas.height = newHeight
    
          const ctx = canvas.getContext('2d')
          ctx.drawImage(img, 0, 0, newWidth, newHeight)
    
          canvas.toBlob(
            blob => resolve(blob),
            'image/jpeg',
            quality
          )
        }
        img.src = URL.createObjectURL(file)
      })
    }

    loadHeaderImage()
    loadPersons()
  </script>

</body>
</html>

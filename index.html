<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Annas & Nadjas Hutvoting</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
    }
    h1 {
      margin-bottom: 20px;
    }
    #person-list {
      margin-top: 20px;
    }
.person {
  background: #fafafa;
  border-radius: 8px;
  margin-bottom: 12px;
  border: 1px solid #eee;
}
    #new-person {
      margin-top: 30px;
      display: flex;
      gap: 10px;
    }
    input[type="text"] {
      flex: 1;
      padding: 8px;
      font-size: 16px;
    }
    button {
      padding: 8px 14px;
      font-size: 16px;
      cursor: pointer;
    }

    /* Mobile-Optimierung */
@media (max-width: 600px) {
  body {
    margin: 20px;
    padding: 0 4px;
  }

  h1 {
    font-size: 1.6rem;
    text-align: center;
  }

  #new-person {
    flex-direction: column;
  }

  input[type="text"] {
    width: 100%;
    font-size: 18px;
  }

  button {
    width: 100%;
    font-size: 18px;
    padding: 12px;
  }
.person {
  background: #fafafa;
  border-radius: 8px;
  margin-bottom: 12px;
  border: 1px solid #eee;
}
}
  </style>
</head>
<body>

  <h2>Annas & Nadjas Hutvoting</h2>
  <div>Du hast 5 Stimmen, verteile sie weise.</div>

  <div id="new-person">
    <input id="person-name" type="text" placeholder="Hutträger:in eingeben" />
    <button id="add-btn">Hinzufügen</button>
  </div>

  <div id="person-list"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'

    const supabase = createClient(
      'https://encergwbfwrbirypfczq.supabase.co',
      'sb_publishable_22vd4SJ51OkyVTSSGKIl9A_8ECO4VpG'
    )

    // -----------------------------

    // 1) Anonymous Auth sicherstellen
    // -----------------------------
    const { data: session } = await supabase.auth.getSession()
    if (!session.session) {
      await supabase.auth.signInAnonymously()
    }

    // -----------------------------
    // 2) Personen und Votes laden
    // -----------------------------
    async function loadPersons() {
      const list = document.getElementById('person-list')
      list.innerHTML = 'Lade Personen…'
    
      const user = (await supabase.auth.getUser()).data.user
    
      // Personen + Votes laden
      const { data: persons, error } = await supabase
        .from('person')
        .select(`
          id,
          name,
          vote:vote(person_id, voter_id)
        `)
        .order('name', { ascending: true })
    
      if (error) {
        list.innerHTML = 'Fehler beim Laden.'
        console.error(error)
        return
      }
    
      // Votes des Users laden
      const { data: myVotes } = await supabase
        .from('vote')
        .select('*')
        .eq('voter_id', user.id)
    
      list.innerHTML = ''
    
      persons.forEach(person => {
        const div = document.createElement('div')
        div.className = 'person'
    
        const voteCount = person.vote.length
        const hasVoted = myVotes.some(v => v.person_id === person.id)
    
        div.innerHTML = `
          <strong>${person.name}</strong><br>
           <img 
    src="${person.image_url ?? ''}" 
    data-img-id="${person.id}" 
    style="max-width:120px; margin:6px 0;"
  ><br>
          Votes: ${voteCount}<br>
          <button data-id="${person.id}" class="vote-btn">
            ${hasVoted ? 'Unvote' : 'Vote'}
          </button>
          <input type="file" data-id="${person.id}" class="upload-input" accept="image/*" style="margin-top:6px;">
          <button data-id="${person.id}" class="upload-btn">Foto hochladen</button>
        `
    
        list.appendChild(div)
      })
    
      // Buttons aktivieren
      document.querySelectorAll('.vote-btn').forEach(btn => {
        btn.addEventListener('click', () => toggleVote(btn.dataset.id))
      })

          document.querySelectorAll('.upload-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    const id = btn.dataset.id
    const fileInput = document.querySelector(`.upload-input[data-id="${id}"]`)
    const file = fileInput.files[0]
    console.log(file)
    if (!file) {
      alert('Bitte ein Bild auswählen.')
      return
    }
    console.log('upload image')
    await uploadImage(id, file)
  })
})
    }




    async function toggleVote(personId) {
  const user = (await supabase.auth.getUser()).data.user

  // Prüfen ob User schon für diese Person votet
  const { data: existingVote } = await supabase
    .from('vote')
    .select('*')
    .eq('person_id', personId)
    .eq('voter_id', user.id)
    .maybeSingle()

  if (existingVote) {
    // UNVOTE
    await supabase.from('vote').delete().eq('id', existingVote.id)
    loadPersons()
    return
  }

  // Prüfen ob User schon 5 Votes hat
  const { data: myVotes } = await supabase
    .from('vote')
    .select('*')
    .eq('voter_id', user.id)

  if (myVotes.length >= 5) {
    alert('Du hast bereits 5 Votes vergeben.')
    return
  }

  // VOTE
  await supabase.from('vote').insert({
    person_id: personId,
    voter_id: user.id
  })

  loadPersons()
}

    loadPersons()

    // -----------------------------
    // 3) Neue Person hinzufügen
    // -----------------------------
    document.getElementById('add-btn').addEventListener('click', async () => {
      const nameInput = document.getElementById('person-name')
      const name = nameInput.value.trim()

      if (!name) return

      const { data: existing } = await supabase
  .from('person')
  .select('id')
  .eq('name', name)
  .maybeSingle()

      if(existing) {
        alert('Der Name existiert schon.')
        return
      }
      
      const { error } = await supabase
        .from('person')
        .insert({ name })

      if (error) {
        alert('Fehler: ' + error.message)
        return
      }

      nameInput.value = ''
      loadPersons()
    })


async function uploadImage(personId, file) {
  const fileExt = file.name.split('.').pop()
  const fileName = `${personId}.${fileExt}`
  const filePath = `person-images/${fileName}`

  // Datei hochladen
  const { error: uploadError } = await supabase.storage
    .from('person-images')
    .upload(filePath, file, { upsert: true })

  if (uploadError) {
    console.error(uploadError)
    alert('Upload fehlgeschlagen.')
    return
  }

  // Public URL holen
  const { data: publicUrlData } = supabase.storage
    .from('person-images')
    .getPublicUrl(filePath)

  const publicUrl = publicUrlData.publicUrl

  // URL in DB speichern
  const { error: updateError } = await supabase
    .from('person')
    .update({ image_url: publicUrl })
    .eq('id', personId)

  if (updateError) {
    console.error(updateError)
    alert('Fehler beim Speichern der Bild-URL.')
    return
  }

  // 🔥 Bild sofort aktualisieren
  const img = document.querySelector(`img[data-img-id="${personId}"]`)
  if (img) {
    img.src = publicUrl + `?t=${Date.now()}`  // Cache-Busting
  }
}

  </script>

</body>
</html>

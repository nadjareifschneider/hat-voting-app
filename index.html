<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Annas & Nadjas Hutvoting</title>

  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
    }

    h2 {
      margin-bottom: 10px;
    }

    /* Person Card */
    .person {
      background: #fafafa;
      border-radius: 12px;
      border: 1px solid #ddd;
      padding: 20px;
      margin-bottom: 20px;
    }

    .person-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .person-name {
      font-size: 1.2rem;
      font-weight: bold;
    }

    .person img {
      width: 120px;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    /* Buttons */
    .vote-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    .vote {
      background: #2ecc71; /* Grün */
    }

    .unvote {
      background: #e74c3c; /* Rot */
    }

    .upload-btn {
      margin-top: 8px;
      padding: 6px 12px;
      border-radius: 6px;
      border: none;
      background: #3498db;
      color: white;
      cursor: pointer;
    }

    /* New Person Form */
    #new-person {
      margin-top: 30px;
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 8px;
      font-size: 16px;
    }

    button {
      cursor: pointer;
    }

    /* Mobile */
    @media (max-width: 600px) {
      body {
        margin: 20px;
      }

      #new-person {
        flex-direction: column;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <h2>Annas & Nadjas Hutvoting</h2>
  <div>Du hast 5 Stimmen, verteile sie weise.</div>

  <div id="new-person">
    <input id="person-name" type="text" placeholder="Hutträger:in eingeben" />
    <button id="add-btn">Hinzufügen</button>
  </div>

  <div id="person-list"></div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js'

    const supabase = createClient(
      'https://encergwbfwrbirypfczq.supabase.co',
      'sb_publishable_22vd4SJ51OkyVTSSGKIl9A_8ECO4VpG'
    )

    // -----------------------------
    // Auth sicherstellen
    // -----------------------------
    const { data: session } = await supabase.auth.getSession()
    if (!session.session) {
      await supabase.auth.signInAnonymously()
    }

    // -----------------------------
    // Personen laden
    // -----------------------------
    async function loadPersons() {
      const list = document.getElementById('person-list')
      list.innerHTML = 'Lade Personen…'

      const user = (await supabase.auth.getUser()).data.user

      const { data: persons } = await supabase
        .from('person')
        .select(`
          id,
          name,
          image_url,
          vote:vote(person_id, voter_id)
        `)
        .order('name', { ascending: true })

      const { data: myVotes } = await supabase
        .from('vote')
        .select('*')
        .eq('voter_id', user.id)

      list.innerHTML = ''

      persons.forEach(person => {
        const hasVoted = myVotes.some(v => v.person_id === person.id)
        const voteCount = person.vote.length

        const div = document.createElement('div')
        div.className = 'person'

        div.innerHTML = `
          <div class="person-header">
            <div class="person-name">${person.name} (${voteCount} votes)</div>
            <button 
              data-id="${person.id}" 
              class="vote-btn ${hasVoted ? 'unvote' : 'vote'}"
            >
              ${hasVoted ? 'Unvote' : 'Vote'}
            </button>
          </div>

          <img 
            src="${person.image_url ?? ''}" 
            data-img-id="${person.id}"
          >

          <input type="file" data-id="${person.id}" class="upload-input" accept="image/*">
          <button data-id="${person.id}" class="upload-btn">Foto hochladen</button>
        `

        list.appendChild(div)
      })

      // Vote Buttons
      document.querySelectorAll('.vote-btn').forEach(btn => {
        btn.addEventListener('click', () => toggleVote(btn.dataset.id))
      })

      // Upload Buttons
      document.querySelectorAll('.upload-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id
          const fileInput = document.querySelector(`.upload-input[data-id="${id}"]`)
          const file = fileInput.files[0]

          if (!file) {
            alert('Bitte ein Bild auswählen.')
            return
          }

          await uploadImage(id, file)
        })
      })
    }

    // -----------------------------
    // Vote toggeln
    // -----------------------------
    async function toggleVote(personId) {
      const user = (await supabase.auth.getUser()).data.user

      const { data: existingVote } = await supabase
        .from('vote')
        .select('*')
        .eq('person_id', personId)
        .eq('voter_id', user.id)
        .maybeSingle()

      if (existingVote) {
        await supabase.from('vote').delete().eq('id', existingVote.id)
        return loadPersons()
      }

      const { data: myVotes } = await supabase
        .from('vote')
        .select('*')
        .eq('voter_id', user.id)

      if (myVotes.length >= 5) {
        alert('Du hast bereits 5 Votes vergeben.')
        return
      }

      await supabase.from('vote').insert({
        person_id: personId,
        voter_id: user.id
      })

      loadPersons()
    }

    // -----------------------------
    // Neue Person hinzufügen
    // -----------------------------
    document.getElementById('add-btn').addEventListener('click', async () => {
      const nameInput = document.getElementById('person-name')
      const name = nameInput.value.trim()

      if (!name) return

      const { data: existing } = await supabase
        .from('person')
        .select('id')
        .eq('name', name)
        .maybeSingle()

      if (existing) {
        alert('Der Name existiert schon.')
        return
      }

      await supabase.from('person').insert({ name })

      nameInput.value = ''
      loadPersons()
    })

    // -----------------------------
    // Bild hochladen
    // -----------------------------
    async function uploadImage(personId, file) {
      const fileExt = file.name.split('.').pop()
      const fileName = `${personId}.${fileExt}`
      const filePath = `person-images/${fileName}`

      const { error: uploadError } = await supabase.storage
        .from('person-images')
        .upload(filePath, file, { upsert: true })

      if (uploadError) {
        alert('Upload fehlgeschlagen.')
        return
      }

      const { data: publicUrlData } = supabase.storage
        .from('person-images')
        .getPublicUrl(filePath)

      const publicUrl = publicUrlData.publicUrl

      await supabase
        .from('person')
        .update({ image_url: publicUrl })
        .eq('id', personId)

      // Bild sofort aktualisieren
      const img = document.querySelector(`img[data-img-id="${personId}"]`)
      if (img) {
        img.src = publicUrl + `?t=${Date.now()}`
      }
    }

    loadPersons()
  </script>

</body>
</html>
